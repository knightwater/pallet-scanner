<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pallet Scanner Cloud Sync</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
/* CSS ส่วนที่ปรับปรุงเพื่อความสวยงามและการแสดงผลบนมือถือ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh; line-height: 1.5;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login-box{background:#1e293b;border-radius:16px;padding:40px;width:90%;max-width:320px;text-align:center;box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1)}
.login-box h1{font-size:1.5rem;margin-bottom:8px;color:#38bdf8}
.login-box p{color:#94a3b8;font-size:.9rem;margin-bottom:24px}
input[type=password],input[type=text],textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem;outline:none}
input:focus{border-color:#38bdf8}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:#38bdf8;color:#0f172a}
.btn-primary:hover{background:#0ea5e9}
.btn-danger{background:#ef4444;color:#fff}
.btn-warning{background:#f59e0b;color:#0f172a}
.btn-gray{background:#475569;color:#e2e8f0}
.btn-sm{padding:6px 12px;font-size:.8rem}

.app{display:none;flex-direction:column;min-height:100vh}
header{background:#1e293b;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
header h1{font-size:1.2rem;color:#38bdf8}
.tabs{display:flex;gap:4px;padding:12px 16px;background:#1e293b;border-bottom:1px solid #334155;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:#94a3b8;border:none;background:transparent;transition:.2s}
.tab.active{background:#38bdf8;color:#0f172a}
.content{flex:1;padding:16px;overflow-y:auto}

.scan-box{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px}
.scan-input-row{display:flex;gap:8px;align-items:center}
.scan-input{flex:1;padding:12px 16px;border-radius:8px;border:2px solid #38bdf8;background:#0f172a;color:#e2e8f0;font-size:1.1rem;outline:none;min-width:0}
#qr-reader{width:100%;max-width:400px;margin:12px auto;border-radius:8px;overflow:hidden}
.camera-btn{background:#7c3aed;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem}

/* Table styling */
.table-container{overflow-x:auto;background:#1e293b;border-radius:12px;padding:10px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#334155;padding:12px 8px;text-align:left;color:#94a3b8}
td{padding:10px 8px;border-bottom:1px solid #0f172a}
.status-badge{padding:3px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
.s-used{background:#14532d;color:#4ade80}
.s-unused{background:#374151;color:#9ca3af}
.s-broken{background:#7f1d1d;color:#f87171}

.toast{position:fixed;top:20px;right:20px;z-index:999;padding:12px 20px;border-radius:10px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(10px)}
.toast-ok{background:#14532d;color:#4ade80;border:1px solid #4ade80}
.toast-err{background:#7f1d1d;color:#f87171;border:1px solid #f87171}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:200;padding:20px}
.modal.open{display:flex}
.modal-box{background:#1e293b;border-radius:16px;padding:24px;width:100%;max-width:340px}
.hidden{display:none}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🏭 Pallet Scanner</h1>
    <p>ระบบบันทึก Cloud (Google Sheets)</p>
    <input type="password" id="pwInput" placeholder="รหัสผ่าน">
    <button class="btn btn-primary" onclick="login()" style="width:100%;margin-top:12px">เข้าสู่ระบบ</button>
    <p id="loginErr" style="color:#ef4444;margin-top:8px;font-size:.85rem;display:none">รหัสผ่านไม่ถูกต้อง</p>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>🏭 Pallet Scanner</h1>
    <button class="btn btn-gray btn-sm" onclick="logout()">ออกจากระบบ</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan',this)">📷 สแกน</button>
    <button class="tab" onclick="switchTab('summary',this)">📊 สรุป</button>
    <button class="tab" onclick="switchTab('set1',this)">CS1</button>
    <button class="tab" onclick="switchTab('set2',this)">NES</button>
    <button class="tab" onclick="switchTab('set3',this)">CS2</button>
    <button class="tab" onclick="switchTab('set4',this)">PL</button>
    <button class="tab" onclick="switchTab('log',this)">📋 Log</button>
  </div>

  <div class="content">
    <div id="tab-scan">
      <div class="scan-box">
        <h3 style="margin-bottom:12px;color:#38bdf8">สแกนพาเลท</h3>
        <div class="scan-input-row">
          <input class="scan-input" id="scanInput" type="text" placeholder="สแกนหรือพิมพ์รหัสที่นี่...">
          <button class="camera-btn" onclick="toggleCamera()">📷 กล้อง</button>
          <button class="btn btn-primary" onclick="processScan()">บันทึก</button>
        </div>
        <div id="qr-reader" class="hidden"></div>
        <div id="scanResult" style="margin-top:15px; padding:10px; border-radius:8px; text-align:center; display:none;"></div>
      </div>
      <div class="scan-box">
        <h3 style="color:#94a3b8;font-size:.9rem;margin-bottom:8px">สแกนล่าสุด (หน้างาน)</h3>
        <div id="recentScans" style="font-size: 0.85rem;"></div>
      </div>
    </div>

    <div id="tab-summary" class="hidden"></div>
    <div id="tab-set1" class="hidden"></div>
    <div id="tab-set2" class="hidden"></div>
    <div id="tab-set3" class="hidden"></div>
    <div id="tab-set4" class="hidden"></div>
    <div id="tab-log" class="hidden">
        <div id="logList"></div>
    </div>
  </div>
</div>

<div class="modal" id="remarkModal">
  <div class="modal-box">
    <h3 style="color:#f59e0b; margin-bottom:10px;">🔴 รายงานชำรุด</h3>
    <p style="margin-bottom:10px;">รหัส: <span id="remarkCode" style="font-weight:bold; color:#f59e0b;"></span></p>
    <textarea id="remarkText" placeholder="ระบุอาการชำรุด..."></textarea>
    <div style="display:flex; gap:8px; margin-top:15px; justify-content:flex-end;">
      <button class="btn btn-gray btn-sm" onclick="closeRemark()">ยกเลิก</button>
      <button class="btn btn-danger btn-sm" onclick="confirmRemark()">ยืนยันบันทึกชำรุด</button>
    </div>
  </div>
</div>

<script>
// URL สำหรับเชื่อมต่อกับ Google Apps Script ของคุณ
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3hCOEa1QmQRhIRNII1Pk3G3vFYZbbmWA0Qq3E0mMfNjPUV8wLQz4IQaU4uyoDroQY/exec";
const PASSWORD = "wms";

// --- Database Logic ---
function genList(prefix,start,end,pad){
  let a=[];
  for(let i=start;i<=end;i++) a.push(prefix+String(i).padStart(pad,'0'));
  return a;
}

const SETS=[
  {id:'set1',name:'ชุด 1 (CS1)',list:genList('CS',100001,101800,6)},
  {id:'set2',name:'ชุด 2 (NES)',list:genList('NES',1,500,5)},
  {id:'set3',name:'ชุด 3 (CS2)',list:genList('CS',200001,204400,6)},
  {id:'set4',name:'ชุด 4 (PL)',list:genList('PL',1,7400,6)},
];

const CODE_TO_SET = {};
SETS.forEach((s,i) => s.list.forEach(c => CODE_TO_SET[c] = i));
const MASTER = new Set(Object.keys(CODE_TO_SET));

let scanned = {}, scanLog = [], currentTab = 'scan';
let html5QrCode = null, cameraOn = false, remarkTarget = null;

// --- Functions ---
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  setTimeout(()=>el.classList.remove('show'), 3000);
}

function login(){
  if(document.getElementById('pwInput').value === PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadFromLocal();
    renderAll();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout(){ location.reload(); }

function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  currentTab = name;
  if(name.startsWith('set')) renderSetTab(name.replace('set',''));
}

async function processScan(code) {
  const inp = document.getElementById('scanInput');
  const val = (code || inp.value).trim().toUpperCase();
  if(!val) return;
  
  inp.value = '';
  if(!MASTER.has(val)) {
    showToast("ไม่พบรหัสนี้ในระบบ", "err");
    return;
  }

  // บันทึกสถานะใน Browser (Local)
  scanned[val] = { ts: new Date().toISOString(), broken: false };
  saveToLocal();
  
  // ส่งข้อมูลไป Cloud (Google Sheets)
  await sendToSheet(val, "USED", "");
  
  addLog(val, "ok", "สแกนสำเร็จ");
  showToast("บันทึกลง Cloud เรียบร้อย: " + val, "ok");
  renderRecent();
}

async function sendToSheet(code, status, remark) {
    const ts = new Date().toISOString();
    // ใช้ URLSearchParams เพื่อสร้าง Query String สำหรับส่งไป doGet/doPost
    const url = `${SCRIPT_URL}?code=${encodeURIComponent(code)}&status=${encodeURIComponent(status)}&remark=${encodeURIComponent(remark)}&ts=${encodeURIComponent(ts)}`;
    
    try {
        // ส่งแบบ no-cors เพื่อป้องกันปัญหาติด Security Policy แต่ข้อมูลจะยังไปถึง Apps Script
        await fetch(url, { method: 'POST', mode: 'no-cors' });
    } catch (e) {
        console.error("Cloud Sync Error:", e);
    }
}

// Camera Logic
function toggleCamera(){
  if(cameraOn) {
    html5QrCode.stop();
    document.getElementById('qr-reader').classList.add('hidden');
    cameraOn = false;
  } else {
    document.getElementById('qr-reader').classList.remove('hidden');
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, (c)=>processScan(c));
    cameraOn = true;
  }
}

// Remark / Broken
function openRemark(code){
    remarkTarget = code;
    document.getElementById('remarkCode').textContent = code;
    document.getElementById('remarkModal').classList.add('open');
}
function closeRemark(){ document.getElementById('remarkModal').classList.remove('open'); }
async function confirmRemark(){
    const msg = document.getElementById('remarkText').value;
    scanned[remarkTarget] = { ts: new Date().toISOString(), broken: true, remark: msg };
    saveToLocal();
    await sendToSheet(remarkTarget, "BROKEN", msg);
    addLog(remarkTarget, "err", "แจ้งชำรุด: " + msg);
    closeRemark();
    showToast("บันทึกชำรุดลง Cloud แล้ว", "ok");
    renderAll();
}

// Helper Functions
function addLog(code, type, msg){
    scanLog.unshift({ code, type, msg, ts: new Date().toLocaleString('th-TH') });
    if(scanLog.length > 50) scanLog.pop();
}
function renderRecent(){
    const el = document.getElementById('recentScans');
    el.innerHTML = scanLog.slice(0,5).map(l => `<div style="padding:5px; border-bottom:1px solid #334155;"><b>${l.code}</b> - ${l.msg} <small>(${l.ts})</small></div>`).join('');
}
function saveToLocal(){ localStorage.setItem('pallet_data', JSON.stringify(scanned)); }
function loadFromLocal(){ const d = localStorage.getItem('pallet_data'); if(d) scanned = JSON.parse(d); }
function renderAll(){ renderRecent(); }

document.getElementById('scanInput').addEventListener('keydown', e => { if(e.key === 'Enter') processScan(); });
</script>
</body>
</html>
