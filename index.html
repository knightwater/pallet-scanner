<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pallet Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login-box{background:#1e293b;border-radius:16px;padding:40px;width:320px;text-align:center}
.login-box h1{font-size:1.5rem;margin-bottom:8px;color:#38bdf8}
.login-box p{color:#94a3b8;font-size:.9rem;margin-bottom:24px}
input[type=password],input[type=text]{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem;outline:none}
input:focus{border-color:#38bdf8}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s}
.btn-primary{background:#38bdf8;color:#0f172a}
.btn-primary:hover{background:#0ea5e9}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-warning{background:#f59e0b;color:#0f172a}
.btn-warning:hover{background:#d97706}
.btn-success{background:#22c55e;color:#0f172a}
.btn-gray{background:#475569;color:#e2e8f0}
.btn-gray:hover{background:#334155}
.btn-sm{padding:6px 12px;font-size:.8rem}

.app{display:none;flex-direction:column;min-height:100vh}
header{background:#1e293b;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
header h1{font-size:1.2rem;color:#38bdf8}
.tabs{display:flex;gap:4px;padding:12px 16px;background:#1e293b;border-bottom:1px solid #334155;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:#94a3b8;border:none;background:transparent;transition:.2s}
.tab.active{background:#38bdf8;color:#0f172a}
.tab:hover:not(.active){background:#334155;color:#e2e8f0}
.content{flex:1;padding:16px;overflow-y:auto}

.scan-box{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px}
.scan-input-row{display:flex;gap:8px;align-items:center}
.scan-input{flex:1;padding:12px 16px;border-radius:8px;border:2px solid #38bdf8;background:#0f172a;color:#e2e8f0;font-size:1.1rem;outline:none;min-width:0;letter-spacing:.05em}
.scan-result{margin-top:12px;padding:12px;border-radius:8px;font-weight:600;text-align:center;font-size:1rem;display:none}
.scan-result.ok{background:#14532d;color:#4ade80;display:block}
.scan-result.err{background:#7f1d1d;color:#f87171;display:block}
.scan-result.dup{background:#78350f;color:#fbbf24;display:block}

#qr-reader{width:100%;max-width:400px;margin:12px auto}
.camera-btn{background:#7c3aed;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem;white-space:nowrap}
.camera-btn:hover{background:#6d28d9}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#1e293b;border-radius:12px;padding:16px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700}
.stat-card .lbl{font-size:.8rem;color:#94a3b8;margin-top:4px}
.stat-card.blue .num{color:#38bdf8}
.stat-card.green .num{color:#22c55e}
.stat-card.red .num{color:#ef4444}
.stat-card.gray .num{color:#94a3b8}

.set-section{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:16px}
.set-section h3{font-size:1rem;font-weight:700;margin-bottom:12px;color:#38bdf8}
.set-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge{padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:600}
.badge-total{background:#1e40af;color:#93c5fd}
.badge-used{background:#14532d;color:#4ade80}
.badge-unused{background:#374151;color:#9ca3af}
.badge-broken{background:#7f1d1d;color:#f87171}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#334155;padding:8px;text-align:left;color:#94a3b8;font-weight:600}
td{padding:8px;border-bottom:1px solid #1e293b;vertical-align:middle}
tr:hover td{background:#263548}
.status-badge{padding:3px 8px;border-radius:12px;font-size:.75rem;font-weight:600;display:inline-block}
.s-used{background:#14532d;color:#4ade80}
.s-unused{background:#374151;color:#9ca3af}
.s-broken{background:#7f1d1d;color:#f87171}

.action-row{display:flex;gap:6px;justify-content:flex-end;margin-bottom:12px;flex-wrap:wrap}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:5px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:.8rem;cursor:pointer}
.filter-btn.active{border-color:#38bdf8;color:#38bdf8}
.search-inp{padding:6px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:.85rem;outline:none;width:200px}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;z-index:200}
.modal.open{display:flex}
.modal-box{background:#1e293b;border-radius:16px;padding:24px;width:340px;max-width:90vw}
.modal-box h3{margin-bottom:12px;font-size:1.1rem}
.modal-footer{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.toast{position:fixed;top:20px;right:20px;z-index:999;padding:12px 20px;border-radius:10px;font-weight:600;font-size:.9rem;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.toast-ok{background:#14532d;color:#4ade80;border:1px solid #4ade80}
.toast.toast-err{background:#7f1d1d;color:#f87171;border:1px solid #f87171}

.log-list{max-height:300px;overflow-y:auto}
.log-item{padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:.85rem}
.log-item.log-ok{background:#14532d;color:#4ade80}
.log-item.log-err{background:#7f1d1d;color:#f87171}
.log-item.log-dup{background:#78350f;color:#fbbf24}
.log-item.log-broken{background:#4a1942;color:#f0abfc}
.ts{font-size:.75rem;opacity:.7;margin-left:8px}
.hidden{display:none}
.td-actions{display:flex;gap:4px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🏭 Pallet Scanner</h1>
    <p>ระบบบันทึกการใช้งานพาเลท</p>
    <input type="password" id="pwInput" placeholder="รหัสผ่าน">
    <button class="btn btn-primary" onclick="login()" style="width:100%;margin-top:12px">เข้าสู่ระบบ</button>
    <p id="loginErr" style="color:#ef4444;margin-top:8px;font-size:.85rem;display:none">รหัสผ่านไม่ถูกต้อง</p>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <header>
    <h1>🏭 Pallet Scanner</h1>
    <button class="btn btn-gray btn-sm" onclick="logout()">ออกจากระบบ</button>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan',this)">📷 สแกน</button>
    <button class="tab" onclick="switchTab('summary',this)">📊 สรุป</button>
    <button class="tab" onclick="switchTab('set1',this)">ชุด 1 CS1</button>
    <button class="tab" onclick="switchTab('set2',this)">ชุด 2 NES</button>
    <button class="tab" onclick="switchTab('set3',this)">ชุด 3 CS2</button>
    <button class="tab" onclick="switchTab('set4',this)">ชุด 4 PL</button>
    <button class="tab" onclick="switchTab('log',this)">📋 Log</button>
  </div>
  <div class="content">
    <div id="tab-scan">
      <div class="scan-box">
        <h3 style="margin-bottom:12px;color:#38bdf8">สแกน / พิมพ์ Barcode</h3>
        <div class="scan-input-row">
          <input class="scan-input" id="scanInput" type="text" placeholder="สแกนหรือพิมพ์ barcode แล้วกด Enter...">
          <button class="camera-btn" onclick="toggleCamera()">📷 กล้อง</button>
          <button class="btn btn-primary" onclick="processScan()">บันทึก</button>
        </div>
        <div id="qr-reader" class="hidden"></div>
        <div id="scanResult" class="scan-result"></div>
      </div>
      <div class="scan-box">
        <h3 style="color:#94a3b8;font-size:.9rem;margin-bottom:8px">สแกนล่าสุด</h3>
        <div id="recentScans" class="log-list"></div>
      </div>
    </div>
    <div id="tab-summary" class="hidden"></div>
    <div id="tab-set1" class="hidden"></div>
    <div id="tab-set2" class="hidden"></div>
    <div id="tab-set3" class="hidden"></div>
    <div id="tab-set4" class="hidden"></div>
    <div id="tab-log" class="hidden">
      <div class="action-row">
        <button class="btn btn-danger btn-sm" onclick="showConfirm('ล้าง Log ทั้งหมด?',()=>{scanLog=[];saveLogs();renderLog()})">ล้าง Log</button>
        <button class="btn btn-warning btn-sm" onclick="exportCSV('log')">Export CSV</button>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal" id="confirmModal">
  <div class="modal-box">
    <h3 id="confirmMsg" style="color:#fbbf24">ยืนยัน?</h3>
    <div class="modal-footer">
      <button class="btn btn-gray btn-sm" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn">ยืนยัน</button>
    </div>
  </div>
</div>

<!-- Remark Modal -->
<div class="modal" id="remarkModal">
  <div class="modal-box">
    <h3 style="color:#f59e0b">🔴 รายงานพาเลทชำรุด</h3>
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:8px">หมายเลข: <span id="remarkCode" style="color:#fbbf24;font-weight:700"></span></p>
    <textarea id="remarkText" style="width:100%;height:80px;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:.9rem;resize:none;outline:none" placeholder="บันทึกรายละเอียดความชำรุด..."></textarea>
    <div class="modal-footer">
      <button class="btn btn-gray btn-sm" onclick="closeRemark()">ยกเลิก</button>
      <button class="btn btn-danger btn-sm" onclick="confirmRemark()">ยืนยันชำรุด</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdIiQl6D2fF0WZdgOy1SMbUgOfokuV0pVprYjBbf-gdlNq2-SLlh2NWacxXNhTtzBU/exec";
const PASSWORD = "wms";

function genList(prefix,start,end,pad){
  let a=[];
  for(let i=start;i<=end;i++) a.push(prefix+String(i).padStart(pad,'0'));
  return a;
}
const SETS=[
  {id:'set1',name:'ชุด 1 (CS100001-CS101800)',list:genList('CS',100001,101800,6)},
  {id:'set2',name:'ชุด 2 (NES00001-NES00500)',list:genList('NES',1,500,5)},
  {id:'set3',name:'ชุด 3 (CS200001-CS204400)',list:genList('CS',200001,204400,6)},
  {id:'set4',name:'ชุด 4 (PL000001-PL007400)',list:genList('PL',1,7400,6)},
];

// Build fast lookup: code → set index
const CODE_TO_SET = {};
SETS.forEach((s,i) => s.list.forEach(c => CODE_TO_SET[c] = i));
const MASTER = new Set(Object.keys(CODE_TO_SET));

// ─── State (in-memory only — localStorage not supported here) ───
let scanned = {}, scanLog = [], currentTab = 'scan';
let html5QrCode = null, cameraOn = false, remarkTarget = null;
let setFilters = {set1:'all',set2:'all',set3:'all',set4:'all'};

// ─── Toast ───
let toastTimer = null;
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-'+type+' show';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ─── Persist ───
function save(){
  try{ localStorage.setItem('psc', JSON.stringify(scanned)); }catch(e){}
}
function saveLogs(){
  try{ localStorage.setItem('psl', JSON.stringify(scanLog)); }catch(e){}
}
function load(){
  try{ const d=localStorage.getItem('psc'); if(d) scanned=JSON.parse(d); }catch(e){ scanned={}; }
  try{ const d=localStorage.getItem('psl'); if(d) scanLog=JSON.parse(d); }catch(e){ scanLog=[]; }
}

// ─── Confirm Modal ───
let _confirmCb = null;
function showConfirm(msg, cb){
  _confirmCb = cb;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmOkBtn').onclick = function(){ closeConfirm(); if(_confirmCb) _confirmCb(); };
}
function closeConfirm(){ document.getElementById('confirmModal').classList.remove('open'); _confirmCb=null; }

// ─── Auth ───
function login(){
  if(document.getElementById('pwInput').value === PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    load();
    renderAll();
    setTimeout(()=>document.getElementById('scanInput').focus(), 100);
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  stopCamera();
}
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });

// ─── Tabs ───
function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  currentTab = name;
  if(name === 'summary') renderSummary();
  const m = name.match(/^set(\d)$/);
  if(m) renderSetTab(m[1]);
  if(name === 'log') renderLog();
  if(name !== 'scan') stopCamera();
}

// ─── Scan ───
function processScan(code){
  const inp = document.getElementById('scanInput');
  const val = (code || inp.value).trim().toUpperCase();
  if(!val) return;
  inp.value = '';
  inp.focus();

  if(!MASTER.has(val)){
    showResult('err','❌ ไม่พบ '+val+' ใน Master List — ไม่บันทึก');
    addLog(val,'err','ไม่อยู่ใน Master List');
    sendToSheet(val,'ERROR','ไม่อยู่ใน Master List');
    return;
  }
  if(scanned[val] && !scanned[val].broken){
    showResult('dup','⚠️ '+val+' — scan เข้าใช้งานแล้ว (ซ้ำ)');
    addLog(val,'dup','scan ซ้ำ');
    renderRecent();
    return;
  }
  scanned[val] = {ts:new Date().toISOString(), broken:false, remark:''};
  save();
  showResult('ok','✅ '+val+' — scan เข้าใช้งานแล้ว');
  addLog(val,'ok','scan เข้าใช้งานแล้ว');
  sendToSheet(val,'USED','');
  renderRecent();
}

let resultTimer = null;
function showResult(type, msg){
  const el = document.getElementById('scanResult');
  el.className = 'scan-result '+type;
  el.textContent = msg;
  if(resultTimer) clearTimeout(resultTimer);
  resultTimer = setTimeout(()=>{ el.style.display='none'; el.className='scan-result'; }, 3000);
}
document.getElementById('scanInput').addEventListener('keydown', e=>{ if(e.key==='Enter') processScan(); });

// ─── Camera ───
function toggleCamera(){ cameraOn ? stopCamera() : startCamera(); }
function startCamera(){
  const el = document.getElementById('qr-reader');
  el.classList.remove('hidden');
  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},
    code=>{ processScan(code); },()=>{}
  ).then(()=>cameraOn=true).catch(()=>el.classList.add('hidden'));
}
function stopCamera(){
  if(html5QrCode && cameraOn){
    html5QrCode.stop().then(()=>{ html5QrCode=null; cameraOn=false; document.getElementById('qr-reader').classList.add('hidden'); }).catch(()=>{});
  }
}

// ─── DELETE (Fixed) ───
// เก็บ pending delete เพื่อป้องกัน double-call
let _deleteInProgress = false;

function deleteScan(code, setId){
  if(_deleteInProgress) return;
  showConfirm('ลบข้อมูล scan ของ '+code+' ?', ()=>{
    _deleteInProgress = true;

    // 1. ลบออกจาก state แล้ว force-save ทันที
    delete scanned[code];
    save();  // บันทึกลง localStorage

    // ตรวจสอบว่าลบออกจริงหรือเปล่า (sanity check)
    if(scanned[code]){
      showToast('⚠️ ลบไม่สำเร็จ กรุณาลองใหม่','err');
      _deleteInProgress = false;
      return;
    }

    // 2. Log การลบ
    addLog(code,'err','ลบข้อมูลออก');

    // 3. Re-render ทุก panel ที่เกี่ยวข้อง
    renderRecent();

    const n = setId.replace('set','');
    renderSetTab(n);   // render set tab ที่ code นั้นสังกัด

    if(currentTab === 'summary') renderSummary();
    if(currentTab === 'log') renderLog();

    // 4. ถ้า currentTab ต่างจาก set ที่ลบ ให้ render currentTab ด้วย
    const curMatch = currentTab.match(/^set(\d)$/);
    if(curMatch && 'set'+curMatch[1] !== setId) renderSetTab(curMatch[1]);

    showToast('🗑️ ลบ '+code+' เรียบร้อย','ok');
    _deleteInProgress = false;
  });
}

// ─── Remark / Broken ───
function openRemark(code){
  remarkTarget = code;
  document.getElementById('remarkCode').textContent = code;
  document.getElementById('remarkText').value = scanned[code]?.remark || '';
  document.getElementById('remarkModal').classList.add('open');
}
function closeRemark(){ document.getElementById('remarkModal').classList.remove('open'); }
function confirmRemark(){
  const txt = document.getElementById('remarkText').value.trim();
  if(!scanned[remarkTarget]) scanned[remarkTarget] = {ts:new Date().toISOString()};
  scanned[remarkTarget].broken = true;
  scanned[remarkTarget].remark = txt;
  save();
  addLog(remarkTarget,'broken','ชำรุด: '+txt);
  sendToSheet(remarkTarget,'BROKEN',txt);
  showToast('🔴 บันทึกชำรุด '+remarkTarget+' แล้ว','ok');
  closeRemark();
  renderAll();
}

// ─── Log ───
function addLog(code, type, msg){
  scanLog.unshift({code, type, msg, ts:new Date().toISOString()});
  saveLogs();
}
function fmtTs(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('th-TH')+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}

// ─── Render ───
function renderAll(){
  renderRecent();
  if(currentTab === 'summary') renderSummary();
  const m = currentTab.match(/^set(\d)$/);
  if(m) renderSetTab(m[1]);
  if(currentTab === 'log') renderLog();
}

function renderRecent(){
  const el = document.getElementById('recentScans');
  el.innerHTML = scanLog.slice(0,10).map(l=>
    `<div class="log-item log-${l.type}">${l.code} — ${l.msg}<span class="ts">${fmtTs(l.ts)}</span></div>`
  ).join('') || '<p style="color:#475569;font-size:.85rem">ยังไม่มีการสแกน</p>';
}

function renderLog(){
  const el = document.getElementById('logList');
  el.innerHTML = scanLog.map(l=>
    `<div class="log-item log-${l.type}">${l.code} — ${l.msg}<span class="ts">${fmtTs(l.ts)}</span></div>`
  ).join('') || '<p style="color:#475569">ไม่มีข้อมูล</p>';
}

function getStats(list){
  let used=0, broken=0, unused=0;
  list.forEach(c=>{
    if(scanned[c]?.broken) broken++;
    else if(scanned[c]) used++;
    else unused++;
  });
  return {total:list.length, used, broken, unused};
}

function renderSummary(){
  let aU=0, aB=0, aN=0;
  SETS.forEach(s=>{ const st=getStats(s.list); aU+=st.used; aB+=st.broken; aN+=st.unused; });
  const el = document.getElementById('tab-summary');
  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card blue"><div class="num">${MASTER.size.toLocaleString()}</div><div class="lbl">พาเลททั้งหมด</div></div>
      <div class="stat-card green"><div class="num">${aU.toLocaleString()}</div><div class="lbl">scan เข้าใช้งานแล้ว</div></div>
      <div class="stat-card gray"><div class="num">${aN.toLocaleString()}</div><div class="lbl">ยังไม่ได้ scan นำมาใช้งาน</div></div>
      <div class="stat-card red"><div class="num">${aB.toLocaleString()}</div><div class="lbl">พาเลทชำรุด</div></div>
    </div>
    <div id="summaryDetails">${SETS.map(s=>{
      const st=getStats(s.list);
      return `<div class="set-section"><h3>${s.name}</h3><div class="set-stats">
        <span class="badge badge-total">ทั้งหมด ${st.total.toLocaleString()}</span>
        <span class="badge badge-used">scan ใช้งานแล้ว ${st.used.toLocaleString()}</span>
        <span class="badge badge-unused">ยังไม่ได้ scan ${st.unused.toLocaleString()}</span>
        <span class="badge badge-broken">ชำรุด ${st.broken.toLocaleString()}</span>
      </div></div>`;
    }).join('')}</div>`;
}

function renderSetTab(n){
  const idx = parseInt(n)-1;
  const s = SETS[idx];
  const el = document.getElementById('tab-set'+n);
  const filter = setFilters['set'+n] || 'all';
  const st = getStats(s.list);

  // กรอง list ตาม filter
  let rows = s.list;
  if(filter==='used')   rows = rows.filter(c=> scanned[c] && !scanned[c].broken);
  else if(filter==='unused') rows = rows.filter(c=> !scanned[c]);
  else if(filter==='broken') rows = rows.filter(c=> scanned[c]?.broken);

  // สร้าง rows HTML ก่อน แล้ว set innerHTML ครั้งเดียว (ป้องกัน partial render)
  const tableRows = rows.slice(0,500).map(c=>{
    const d = scanned[c];
    // ตรวจสอบ state ล่าสุดจาก scanned object โดยตรง
    const broken = d?.broken === true;
    const used   = d && !broken;
    return `<tr>
      <td style="font-family:monospace;font-weight:600">${c}</td>
      <td><span class="status-badge ${broken?'s-broken':used?'s-used':'s-unused'}">${broken?'ชำรุด':used?'scan เข้าใช้งานแล้ว':'ยังไม่ได้ scan นำมาใช้งาน'}</span></td>
      <td style="font-size:.78rem;color:#94a3b8">${d?.ts ? fmtTs(d.ts) : '-'}</td>
      <td style="font-size:.78rem;color:#f87171">${d?.remark||'-'}</td>
      <td><div class="td-actions">
        <button class="btn btn-warning btn-sm" onclick="openRemark('${c}')">🔴 ชำรุด</button>
        ${d ? `<button class="btn btn-danger btn-sm" onclick="deleteScan('${c}','${s.id}')">🗑️ ลบ</button>` : ''}
      </div></td>
    </tr>`;
  }).join('');

  // เขียน innerHTML ทั้งหมดพร้อมกันครั้งเดียว
  el.innerHTML = `<div class="set-section">
    <h3>${s.name}</h3>
    <div class="set-stats">
      <span class="badge badge-total">ทั้งหมด ${st.total.toLocaleString()}</span>
      <span class="badge badge-used">scan ใช้งานแล้ว ${st.used.toLocaleString()}</span>
      <span class="badge badge-unused">ยังไม่ได้ scan ${st.unused.toLocaleString()}</span>
      <span class="badge badge-broken">ชำรุด ${st.broken.toLocaleString()}</span>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter(${n},'all')">ทั้งหมด (${st.total})</button>
      <button class="filter-btn ${filter==='used'?'active':''}" onclick="setFilter(${n},'used')">scan ใช้งานแล้ว (${st.used})</button>
      <button class="filter-btn ${filter==='unused'?'active':''}" onclick="setFilter(${n},'unused')">ยังไม่ได้ scan (${st.unused})</button>
      <button class="filter-btn ${filter==='broken'?'active':''}" onclick="setFilter(${n},'broken')">ชำรุด (${st.broken})</button>
    </div>
    <div class="action-row">
      <button class="btn btn-warning btn-sm" onclick="exportCSV('set${n}')">Export CSV</button>
    </div>
    <div style="overflow-x:auto">
    <table>
      <tr><th>หมายเลขพาเลท</th><th>สถานะ</th><th>เวลา scan</th><th>หมายเหตุ</th><th>Action</th></tr>
      ${tableRows}
      ${rows.length>500 ? `<tr><td colspan="5" style="text-align:center;color:#94a3b8">แสดง 500 รายการแรก (ทั้งหมด ${rows.length})</td></tr>` : ''}
    </table></div>
  </div>`;
}

function setFilter(n, f){ setFilters['set'+n]=f; renderSetTab(n); }

// ─── Export ───
function exportCSV(type){
  let rows=[], fn='';
  if(type==='log'){
    rows=[['Code','Type','Message','Timestamp'], ...scanLog.map(l=>[l.code,l.type,l.msg,l.ts])];
    fn='scan_log.csv';
  } else {
    const idx = parseInt(type.replace('set',''))-1;
    const s = SETS[idx];
    rows=[['Code','Status','Timestamp','Remark'], ...s.list.map(c=>{
      const d = scanned[c];
      return [c, d?.broken?'BROKEN':d?'USED':'UNUSED', d?.ts||'', d?.remark||''];
    })];
    fn = s.id+'_export.csv';
  }
  const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = fn; a.click();
}

// ─── Sheet ───
async function sendToSheet(code, status, remark){
  try{
    const data = new FormData();
    data.append('code',code); data.append('status',status);
    data.append('remark',remark); data.append('ts',new Date().toISOString());
    await fetch(SCRIPT_URL,{method:'POST',body:data,mode:'no-cors'});
  }catch(e){}
}
</script>
